<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wacky Image Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Wacky Image Finder 📸</h1>
            <p>Search for something ridiculous.</p>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="e.g., dancing cats, angry potatoes..." value="funny dogs">
                <button id="search-btn">Fetch!</button>
            </div>
        </header>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Summoning pixels...</p>
        </div>

        <div id="error-message" class="hidden"></div>

        <div id="image-grid" class="grid"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
