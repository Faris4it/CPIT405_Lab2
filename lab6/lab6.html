<!DOCTYPE html>

<head>
    <title>Lab 6</title>
    <style>
         body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 50px;
}

.button-row, .action-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

#likeBtn, #dislikeBtn {
    background-color: #e9ecef;
    border: 1px solid #ced4da;
    border-radius: 8px;
    padding: 15px 30px;
    font-size: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
}

textarea {
    width: 600px;
    height: 150px;
    border-radius: 8px;
    border: 1px solid #ccc;
    padding: 10px;
    font-size: 16px;
    margin-bottom: 20px;
}

#submitBtn, #resetBtn {
    background-color: #555;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
}

#submitBtn:hover, #resetBtn:hover {
    background-color: #333;
}

#commentList {
    margin-top: 20px;
    text-align: left;
    display: inline-block;
    width: 600px;
}
    </style>
</head>

<body>
    <style>
       
    </style>
    <div class="lab-container">
    <h1>Lab 6</h1>
    <h2>Like or dislike</h2>

    <div class="button-row">
        <button id="likeBtn">👍<span id="likeCount">0</span></button>
        <button id="dislikeBtn">👎<span id="dislikeCount">0</span></button>
    </div>

    <h3>Comments</h3>
    <textarea id="commentInput" placeholder="Write a comment..."></textarea>

    <div class="action-row">
        <button id="submitBtn">Submit</button>
        <button id="resetBtn">Clear</button>
    </div>

    <div id="commentList"></div>
</div>

<script src="script.js"></script>

</body>
